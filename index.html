<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helly</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0f0f0f;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Webcam background ───────────────────────────────────── */
  #webcam {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
    overflow: hidden;
  }

  #webcam iframe {
    position: absolute;
    top: 50%; left: 50%;
    width: 177.78vh;
    height: 56.25vw;
    min-width: 120%;
    min-height: 120%;
    transform: translate(-50%, -50%);
    border: none;
  }

  #overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ── UI layer ─────────────────────────────────────────────── */
  #ui {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr auto;
    padding: 5vh 5vw;
    gap: 2vh 0;
    z-index: 3;
  }

  /* ── Clock ───────────────────────────────────────────────── */
  #clock-block {
    grid-column: 1;
    grid-row: 1;
    align-self: start;
    display: flex;
    flex-direction: column;
    gap: 0.5vh;
  }

  #helly {
    font-size: clamp(1.4rem, 2.2vw, 2rem);
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 600;
    line-height: 1;
    text-shadow: 0 1px 8px rgba(0,0,0,0.8);
  }

  #clock {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.04em;
    line-height: 1;
    text-shadow: 0 1px 8px rgba(0,0,0,0.8);
    font-variant-numeric: tabular-nums;
  }

  #clock-ampm {
    font-size: 0.28em;
    font-weight: 400;
    letter-spacing: 0.05em;
    color: #ffffff;
    vertical-align: baseline;
    margin-left: 0.2em;
  }

  #date {
    font-size: clamp(0.7rem, 1.1vw, 1rem);
    color: rgba(255,255,255,1);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 600;
    text-shadow: 0 1px 4px rgba(0,0,0,1), 0 2px 12px rgba(0,0,0,1), 0 4px 24px rgba(0,0,0,0.9);
  }


  /* ── Ferries ─────────────────────────────────────────────── */
  #ferries {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    gap: 1.2vh;
    align-self: start;
    align-items: flex-end;
  }

  .ferry-card {
    background: #1a1a1a;
    border-radius: 12px;
    padding: clamp(12px, 1.8vh, 20px) clamp(14px, 1.8vw, 22px);
    border: 0.5px solid rgba(255,255,255,0.08);
    width: 100%;
    max-width: clamp(200px, 22vw, 320px);
  }

  .fc-header {
    display: flex;
    align-items: center;
    gap: 0.6vw;
    margin-bottom: 1.2vh;
  }

  .fc-badge {
    width: clamp(22px, 2vw, 30px);
    height: clamp(22px, 2vw, 30px);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(8px, 0.7vw, 11px);
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    letter-spacing: 0.03em;
  }

  .f4-badge { background: #7c4dab; }
  .f7-badge { background: #e8960a; }

  .fc-dest {
    font-size: clamp(10px, 0.9vw, 14px);
    color: rgba(255,255,255,0.9);
    font-weight: 400;
  }

  .fc-arrow {
    cursor: pointer;
    user-select: none;
    transition: opacity 0.15s;
    padding: 0 0.15em;
  }
  .fc-arrow:hover { opacity: 0.5; }

  .fc-main {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .fc-left { display: flex; flex-direction: column; gap: 2px; }

  .fc-label {
    font-size: clamp(7px, 0.6vw, 10px);
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .fc-countdown {
    font-size: clamp(1.6rem, 3.2vw, 3rem);
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.03em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .fc-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    padding-bottom: 2px;
  }

  .fc-then-label {
    font-size: clamp(7px, 0.6vw, 10px);
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .fc-then-time {
    font-size: clamp(0.85rem, 1.3vw, 1.2rem);
    font-weight: 600;
    color: rgba(255,255,255,0.9);
    font-variant-numeric: tabular-nums;
  }

  /* ── Weather ─────────────────────────────────────────────── */
  #bottom-left {
    grid-column: 1;
    grid-row: 2;
    align-self: end;
    justify-self: start;
    display: flex;
    flex-direction: row;
    flex-wrap: wrap;
    align-items: flex-end;
    gap: 1.5vw;
  }

  #weather-block {
    display: inline-flex;
    flex-direction: column;
    gap: 0.4vh;
    background: #1a1a1a;
    border-radius: 12px;
    padding: clamp(10px, 1.4vh, 16px) clamp(12px, 1.4vw, 18px);
    border: 0.5px solid rgba(255,255,255,0.08);
  }

  #weather-temp {
    font-size: clamp(1.4rem, 3vw, 2.8rem);
    font-weight: 600;
    color: #ffffff;
    line-height: 1;
  }

  #weather-emoji {
    font-size: 0.75em;
    margin-left: 0.25em;
    vertical-align: middle;
  }

  #weather-emoji:empty { display: none; }

  #weather-cond {
    font-size: clamp(0.65rem, 0.9vw, 0.85rem);
    color: rgba(255,255,255,0.9);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 400;
  }


  /* ── Spotify ─────────────────────────────────────────────── */
  #spotify-player {
    border-radius: 12px;
    overflow: hidden;
    width: 100%;
    max-width: clamp(200px, 28vw, 420px);
  }

  #spotify-player iframe {
    width: 100%;
    height: 80px;
    display: block;
    border: none;
  }

  #nudibranch-canvas {
    position: fixed;
    z-index: 4;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  /* ── Molly info card ─────────────────────────────────────── */
  #molly-card {
    position: fixed;
    z-index: 5;
    background: #1a1a1a;
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: clamp(8px, 1.2vh, 12px) clamp(10px, 1.2vw, 16px);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
    white-space: nowrap;
  }

  #molly-card.visible { opacity: 1; }

  #molly-card .mc-name {
    font-size: clamp(0.7rem, 1vw, 0.95rem);
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.02em;
  }

  #molly-card .mc-sci {
    font-size: clamp(0.6rem, 0.85vw, 0.8rem);
    font-style: italic;
    color: rgba(255,255,255,0.65);
    margin-top: 2px;
  }

  #molly-card .mc-desc {
    font-size: clamp(0.6rem, 0.85vw, 0.8rem);
    color: rgba(255,255,255,0.65);
    margin-top: 2px;
  }

  /* ── Games link ──────────────────────────────────────────── */
  #games-btn {
    position: fixed;
    bottom: calc(2vh + clamp(32px, 2.5vw, 40px) + 10px);
    right: 2vw;
    z-index: 10;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    opacity: 0.25;
    transition: opacity 0.2s;
    text-decoration: none;
    display: flex;
  }
  #games-btn:hover { opacity: 0.8; }
  #games-btn svg {
    width: clamp(16px, 1.4vw, 22px);
    height: clamp(16px, 1.4vw, 22px);
    fill: #ffffff;
  }

  /* ── Settings ─────────────────────────────────────────────── */
  #settings-btn {
    position: fixed;
    bottom: 2vh;
    right: 2vw;
    z-index: 10;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    opacity: 0.25;
    transition: opacity 0.2s;
  }

  #settings-btn:hover { opacity: 0.8; }

  #settings-btn svg {
    width: clamp(16px, 1.4vw, 22px);
    height: clamp(16px, 1.4vw, 22px);
    fill: #ffffff;
  }

  #settings-panel {
    position: fixed;
    bottom: calc(2vh + 44px);
    right: 2vw;
    z-index: 10;
    background: #1a1a1a;
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px 16px;
    display: none;
    flex-direction: column;
    gap: 10px;
    min-width: 180px;
  }

  #settings-panel.open { display: flex; }

  #settings-panel .setting-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
  }

  #settings-panel input[type=range] {
    width: 100%;
    accent-color: #ffffff;
    cursor: pointer;
  }

  #overlay-value {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    text-align: right;
  }
</style>
</head>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
var ytPlayer;
function onYouTubeIframeAPIReady() {
  ytPlayer = new YT.Player('yt-player', {
    videoId: '9Pm6Ji6tm7s',
    playerVars: {
      autoplay: 1, mute: 1, controls: 0,
      loop: 1, playlist: '9Pm6Ji6tm7s',
      modestbranding: 1, showinfo: 0, rel: 0, playsinline: 1,
    },
    events: {
      onReady: e => e.target.playVideo(),
      onStateChange: e => {
        if (e.data === YT.PlayerState.PAUSED || e.data === YT.PlayerState.ENDED) {
          e.target.playVideo();
        }
      },
    },
  });
}

const TPC_NDSM       = '30009902';
const TPC_CENTRAAL   = '30009903';
const TPC_PONTSTEIGER = '30009900';
const WORKER       = 'https://hellyhome-proxy.thatharmansinghworkers.workers.dev';
const WEATHER_API  = 'https://api.open-meteo.com/v1/forecast?latitude=52.4009&longitude=4.8917&current=temperature_2m,weather_code&timezone=Europe%2FAmsterdam';
const FERRY_REFRESH   = 30_000;
const WEATHER_REFRESH = 10 * 60_000;

function pad2(n) { return String(n).padStart(2, '0'); }

function parseTime(str) {
  if (!str) return null;
  const m = str.match(/T(\d{2}):(\d{2})/);
  if (!m) return null;
  const t = new Date();
  t.setHours(+m[1], +m[2], 0, 0);
  if (t < Date.now() - 90_000) t.setDate(t.getDate() + 1);
  return t;
}

function secsUntil(t) { return Math.round((t - Date.now()) / 1000); }

function fmtCountdown(secs) {
  if (secs <= 0) return '0:00';
  if (secs < 60) return '0:' + pad2(secs);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  if (m >= 60) return Math.floor(m / 60) + 'h ' + pad2(m % 60) + 'm';
  return m + ':' + pad2(s);
}

function fmt12(t) {
  const h = t.getHours();
  const hour = h % 12 || 12;
  return { time: hour + ':' + pad2(t.getMinutes()), suffix: h < 12 ? 'am' : 'pm' };
}

function fmtClock(t) {
  const { time, suffix } = fmt12(t);
  return time + ' ' + suffix;
}

function weatherEmoji(code) {
  if (code === 0)  return '☀';  // ☀ clear
  if (code <= 2)   return '⛅';  // ⛅ partly cloudy
  if (code === 3)  return '☁';  // ☁ overcast
  if (code <= 49)  return '☁';  // ☁ fog
  if (code <= 65)  return '☔';  // ☔ rain/drizzle
  if (code <= 82)  return '☔';  // ☔ snow/rain showers
  if (code <= 86)  return '❄';  // ❄ snow
  if (code <= 99)  return '⚡';  // ⚡ thunderstorm
  return '';
}

function weatherDesc(code) {
  if (code === 0)  return 'Clear sky';
  if (code <= 2)   return 'Partly cloudy';
  if (code === 3)  return 'Overcast';
  if (code <= 49)  return 'Foggy';
  if (code <= 55)  return 'Drizzle';
  if (code <= 65)  return 'Rain';
  if (code <= 77)  return 'Snow';
  if (code <= 82)  return 'Rain showers';
  if (code <= 86)  return 'Snow showers';
  if (code <= 99)  return 'Thunderstorm';
  return '—';
}

const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function tickClock() {
  const now = new Date();
  const { time, suffix } = fmt12(now);
  const clockEl = document.getElementById('clock');
  clockEl.childNodes[0].textContent = time;
  document.getElementById('clock-ampm').textContent = suffix;
  document.getElementById('date').textContent =
    DAYS[now.getDay()] + ' · ' + now.getDate() + ' ' + MONTHS[now.getMonth()];
}

const state    = { f4: [], f7: [], f4r: [], f7r: [] };
const reversed = { f4: false, f7: false };
let ferryTick  = null;

function renderFerry(id) {
  const src  = reversed[id] ? state[id + 'r'] : state[id];
  const deps = src.filter(d => secsUntil(d) > -10);
  const cdEl = document.getElementById('countdown-' + id);
  const afEl = document.getElementById('after-' + id);
  if (!deps.length) {
    cdEl.textContent = '--:--';
    afEl.textContent = '—';
    return;
  }
  cdEl.textContent = fmtCountdown(secsUntil(deps[0]));
  afEl.textContent = deps[1] ? fmtClock(deps[1]) : '—';
}

async function fetchFerries() {
  try {
    const [res1, res2, res3] = await Promise.all([
      fetch(WORKER + '?tpc=' + TPC_NDSM,        { cache: 'no-store' }),
      fetch(WORKER + '?tpc=' + TPC_CENTRAAL,    { cache: 'no-store' }),
      fetch(WORKER + '?tpc=' + TPC_PONTSTEIGER, { cache: 'no-store' }),
    ]);
    if (!res1.ok || !res2.ok || !res3.ok) throw new Error('HTTP error');
    const [data1, data2, data3] = await Promise.all([res1.json(), res2.json(), res3.json()]);

    const passes1 = data1[TPC_NDSM]?.Passes;
    if (!passes1) throw new Error('No NDSM passes');

    const all = Object.values(passes1)
      .filter(p => p.JourneyStopType === 'FIRST' && p.TripStopStatus !== 'CANCEL')
      .map(p => ({
        line: p.LinePublicNumber,
        time: parseTime(p.ExpectedDepartureTime || p.TargetDepartureTime),
      }))
      .filter(p => p.time && secsUntil(p.time) > -10)
      .sort((a, b) => a.time - b.time);

    state.f4 = all.filter(p => p.line === 'F4').map(p => p.time);
    state.f7 = all.filter(p => p.line === 'F7').map(p => p.time);

    const passes2 = data2[TPC_CENTRAAL]?.Passes || {};
    state.f4r = Object.values(passes2)
      .filter(p => p.LinePublicNumber === 'F4' && p.JourneyStopType === 'FIRST' && p.TripStopStatus !== 'CANCEL')
      .map(p => parseTime(p.ExpectedDepartureTime || p.TargetDepartureTime))
      .filter(t => t && secsUntil(t) > -10)
      .sort((a, b) => a - b);

    const passes3 = data3[TPC_PONTSTEIGER]?.Passes || {};
    state.f7r = Object.values(passes3)
      .filter(p => p.LinePublicNumber === 'F7' && p.JourneyStopType === 'FIRST' && p.TripStopStatus !== 'CANCEL')
      .map(p => parseTime(p.ExpectedDepartureTime || p.TargetDepartureTime))
      .filter(t => t && secsUntil(t) > -10)
      .sort((a, b) => a - b);

    renderFerry('f4');
    renderFerry('f7');

    if (ferryTick) clearInterval(ferryTick);
    ferryTick = setInterval(() => { renderFerry('f4'); renderFerry('f7'); }, 1000);
  } catch (err) {
    console.error('[ferries]', err);
  }
}

async function fetchWeather() {
  try {
    const res = await fetch(WEATHER_API);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    document.getElementById('weather-temp-val').textContent = temp + '°';
    document.getElementById('weather-emoji').textContent = weatherEmoji(code);
    document.getElementById('weather-cond').textContent = weatherDesc(code);
  } catch (err) {
    console.error('[weather]', err);
    setTimeout(fetchWeather, 5000);
  }
}

let manualOpacity = 0;

function updateOverlay() {
  const overlay = document.getElementById('overlay');
  overlay.style.background = `rgba(0,0,0,${manualOpacity})`;
  const slider = document.getElementById('overlay-slider');
  if (slider) {
    slider.value = Math.round(manualOpacity * 100);
    document.getElementById('overlay-value').textContent = Math.round(manualOpacity * 100) + '%';
  }
}

// ── Global mouse tracking + webcam parallax ──────────────────
let globalMouseX = window.innerWidth / 2;
let globalMouseY = window.innerHeight / 2;
let parallaxX = 0, parallaxY = 0;
let targetParallaxX = 0, targetParallaxY = 0;

document.addEventListener('mousemove', (e) => {
  globalMouseX = e.clientX;
  globalMouseY = e.clientY;
  const nx = (e.clientX / window.innerWidth  - 0.5) * 2;
  const ny = (e.clientY / window.innerHeight - 0.5) * 2;
  targetParallaxX = nx * -0.7;
  targetParallaxY = ny * -0.7;
});

(function parallaxLoop() {
  parallaxX += (targetParallaxX - parallaxX) * 0.04;
  parallaxY += (targetParallaxY - parallaxY) * 0.04;
  const iframe = document.querySelector('#webcam iframe');
  if (iframe) {
    iframe.style.transform = `translate(calc(-50% + ${parallaxX.toFixed(3)}vw), calc(-50% + ${parallaxY.toFixed(3)}vh))`;
  }
  requestAnimationFrame(parallaxLoop);
})();

// Nudibranch squirm engine
(function() {
  const canvas = document.getElementById('nudibranch-canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.src = 'nudibranch.png';

  const W = 45, H = 55; // display size
  canvas.width = W + 20;
  canvas.height = H + 20;

  // Molly is always alive — continuous velocity, never truly stops
  const BASE_SPEED = 0.72; // px/frame at ~60fps
  let posX = -300, posY = -300;
  let velX = BASE_SPEED * 0.243; // default 4 o'clock heading
  let velY = BASE_SPEED * 0.970;
  let deflectVX = 0, deflectVY = 0;
  let squirmT = 0;
  let wasOnScreen = false;

  function isOnScreen() {
    return posX > -100 && posX < window.innerWidth + 100 &&
           posY > -80  && posY < window.innerHeight + 80;
  }

  function bringOnScreen() {
    const cx = window.innerWidth / 2, cy = window.innerHeight / 2;
    const side = Math.floor(Math.random() * 4);
    if (side === 0) {
      posX = -80; posY = Math.random() * window.innerHeight * 0.6 + window.innerHeight * 0.2;
    } else if (side === 1) {
      posX = Math.random() * window.innerWidth * 0.6 + window.innerWidth * 0.2; posY = -H - 20;
    } else if (side === 2) {
      posX = window.innerWidth + 80; posY = Math.random() * window.innerHeight * 0.6 + window.innerHeight * 0.2;
    } else {
      posX = Math.random() * window.innerWidth * 0.6 + window.innerWidth * 0.2; posY = window.innerHeight + 20;
    }
    const dx = cx - posX, dy = cy - posY;
    const d = Math.sqrt(dx * dx + dy * dy);
    velX = (dx / d) * BASE_SPEED;
    velY = (dy / d) * BASE_SPEED;
    deflectVX = 0;
    deflectVY = 0;
  }

  // Info card
  const mollyCard = document.getElementById('molly-card');
  let cardActive = false, cardTimer = null, cardShownThisCrossing = false;

  function placeCard() {
    const rect = canvas.getBoundingClientRect();
    let x = rect.right + 10, y = rect.top;
    if (x + 220 > window.innerWidth)  x = rect.left - 220;
    if (y + 80  > window.innerHeight) y = window.innerHeight - 90;
    mollyCard.style.left = x + 'px';
    mollyCard.style.top  = y + 'px';
  }

  function showCard() {
    if (cardActive || cardShownThisCrossing) return;
    cardActive = true;
    cardShownThisCrossing = true;
    placeCard();
    mollyCard.classList.add('visible');
    cardTimer = setTimeout(() => {
      mollyCard.classList.remove('visible');
      cardActive = false;
    }, 4000);
  }

  function hideCard() {
    clearTimeout(cardTimer);
    mollyCard.classList.remove('visible');
    cardActive = false;
  }

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    cardActive ? hideCard() : showCard();
  }, { passive: false });

  document.addEventListener('touchstart', (e) => {
    if (e.target !== canvas) hideCard();
  });

  function tick() {
    squirmT += 0.016;

    // Cursor repulsion — abrupt direction change when cursor gets close
    const mollyCx = posX + W / 2, mollyCy = posY + H / 2;
    const cdx = mollyCx - globalMouseX, cdy = mollyCy - globalMouseY;
    const dist = Math.sqrt(cdx * cdx + cdy * cdy);
    if (dist < 160 && dist > 0) {
      const push = (1 - dist / 160) * 7;
      deflectVX = (cdx / dist) * push;
      deflectVY = (cdy / dist) * push;
    }

    posX += velX + deflectVX;
    posY += velY + deflectVY;
    deflectVX *= 0.88;
    deflectVY *= 0.88;

    // Gentle return force when far off screen — she drifts back naturally
    const FAR = 400;
    if (posX < -FAR || posX > window.innerWidth + FAR || posY < -FAR || posY > window.innerHeight + FAR) {
      const tx = window.innerWidth / 2, ty = window.innerHeight / 2;
      const rx = tx - posX, ry = ty - posY;
      const rd = Math.sqrt(rx * rx + ry * ry);
      velX += (rx / rd) * 0.008;
      velY += (ry / rd) * 0.008;
      const sp = Math.sqrt(velX * velX + velY * velY);
      if (sp > BASE_SPEED * 1.5) { velX = velX / sp * BASE_SPEED * 1.5; velY = velY / sp * BASE_SPEED * 1.5; }
    }

    // Visibility — CSS transition handles the fade
    const nowOnScreen = isOnScreen();
    if (nowOnScreen !== wasOnScreen) {
      wasOnScreen = nowOnScreen;
      canvas.style.opacity = nowOnScreen ? '0.88' : '0';
      canvas.style.pointerEvents = nowOnScreen ? 'auto' : 'none';
      if (!nowOnScreen) { hideCard(); cardShownThisCrossing = false; }
    }

    canvas.style.left = (posX - canvas.width / 2) + 'px';
    canvas.style.top  = posY + 'px';

    // Card: show once per screen entry on proximity
    if (nowOnScreen && dist < 160) showCard();
    if (cardActive) placeCard();

    // Draw squirm
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const slices = 40, sliceH = H / slices, offX = (canvas.width - W) / 2;
    for (let i = 0; i < slices; i++) {
      const srcY = (i / slices) * img.naturalHeight;
      const srcH = img.naturalHeight / slices;
      const wave = Math.sin(squirmT * 2.5 - i * 0.35) * (1.5 + i * 0.06);
      ctx.drawImage(img, 0, srcY, img.naturalWidth, srcH, offX + wave, i * sliceH + 15, W, sliceH + 0.5);
    }

    requestAnimationFrame(tick);
  }

  img.onload = function() {
    setTimeout(() => { bringOnScreen(); requestAnimationFrame(tick); }, (5 + Math.random() * 5) * 1000);
  };

  // Secret: click "Helly" to call Molly back on screen
  document.getElementById('helly').addEventListener('click', bringOnScreen);
})();

// Touch: Molly deflection + pull-to-refresh + sticky webcam pan
(function() {
  let startX = 0, startY = 0;
  let clearTouchTimer = null;
  let isPanning = false;
  let panStartParallaxX = 0, panStartParallaxY = 0;
  const PAN_THRESHOLD = 20;
  const MAX_MOBILE_PAN = 2; // vw/vh

  document.addEventListener('touchstart', (e) => {
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    isPanning = false;
    panStartParallaxX = targetParallaxX;
    panStartParallaxY = targetParallaxY;
    globalMouseX = startX;
    globalMouseY = startY;
    clearTimeout(clearTouchTimer);
  }, { passive: true });

  document.addEventListener('touchmove', (e) => {
    const tx = e.touches[0].clientX;
    const ty = e.touches[0].clientY;
    const dragX = tx - startX;
    const dragY = ty - startY;
    globalMouseX = tx;
    globalMouseY = ty;
    if (!isPanning && Math.sqrt(dragX * dragX + dragY * dragY) > PAN_THRESHOLD) {
      isPanning = true;
    }
    if (isPanning) {
      const clamp = (v, lo, hi) => Math.max(lo, Math.min(hi, v));
      targetParallaxX = clamp(panStartParallaxX - (dragX / window.innerWidth)  * MAX_MOBILE_PAN * 2, -MAX_MOBILE_PAN, MAX_MOBILE_PAN);
      targetParallaxY = clamp(panStartParallaxY - (dragY / window.innerHeight) * MAX_MOBILE_PAN * 2, -MAX_MOBILE_PAN, MAX_MOBILE_PAN);
    }
  }, { passive: true });

  document.addEventListener('touchend', (e) => {
    const dy = e.changedTouches[0].clientY - startY;
    const dx = Math.abs(e.changedTouches[0].clientX - startX);
    if (dy > 90 && dx < 60 && startY < 140) location.reload();
    // parallax target stays sticky — don't reset
    clearTouchTimer = setTimeout(() => { globalMouseX = -999; globalMouseY = -999; }, 300);
  }, { passive: true });
})();
</script>
