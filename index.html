<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Helly</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; height: 100%;
    background: #0f0f0f;
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ── Webcam background ───────────────────────────────────── */
  #webcam {
    position: fixed;
    inset: 0;
    width: 100%; height: 100%;
    pointer-events: none;
    z-index: 0;
  }

  #webcam iframe {
    position: absolute;
    top: 50%; left: 50%;
    width: 177.78vh;
    height: 56.25vw;
    min-width: 100%;
    min-height: 100%;
    transform: translate(-50%, -50%);
    border: none;
  }

  #overlay {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
  }

  /* ── UI layer ─────────────────────────────────────────────── */
  #ui {
    position: fixed;
    inset: 0;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr auto;
    padding: 5vh 5vw;
    gap: 2vh 0;
    z-index: 3;
  }

  /* ── Clock ───────────────────────────────────────────────── */
  #clock-block {
    grid-column: 1;
    grid-row: 1;
    align-self: start;
    display: flex;
    flex-direction: column;
    gap: 0.5vh;
  }

  #helly {
    font-size: clamp(0.7rem, 1.1vw, 1rem);
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  }

  #clock {
    font-size: clamp(3rem, 8vw, 7rem);
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.04em;
    line-height: 1;
  }

  #date {
    font-size: clamp(0.7rem, 1.1vw, 1rem);
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
    text-shadow: 0 1px 6px rgba(0,0,0,0.9);
  }

  /* ── Ferries ─────────────────────────────────────────────── */
  #ferries {
    grid-column: 2;
    grid-row: 1;
    display: flex;
    flex-direction: column;
    gap: 1.2vh;
    align-self: start;
    align-items: flex-end;
  }

  .ferry-card {
    background: #1a1a1a;
    border-radius: 12px;
    padding: clamp(12px, 1.8vh, 20px) clamp(14px, 1.8vw, 22px);
    border: 0.5px solid rgba(255,255,255,0.08);
    width: clamp(200px, 22vw, 320px);
  }

  .fc-header {
    display: flex;
    align-items: center;
    gap: 0.6vw;
    margin-bottom: 1.2vh;
  }

  .fc-badge {
    width: clamp(22px, 2vw, 30px);
    height: clamp(22px, 2vw, 30px);
    border-radius: 6px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(8px, 0.7vw, 11px);
    font-weight: 700;
    color: #fff;
    flex-shrink: 0;
    letter-spacing: 0.03em;
  }

  .f4-badge { background: #7c4dab; }
  .f7-badge { background: #e8960a; }

  .fc-dest {
    font-size: clamp(10px, 0.9vw, 14px);
    color: rgba(255,255,255,0.5);
    font-weight: 400;
  }

  .fc-main {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }

  .fc-left { display: flex; flex-direction: column; gap: 2px; }

  .fc-label {
    font-size: clamp(7px, 0.6vw, 10px);
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .fc-countdown {
    font-size: clamp(1.6rem, 3.2vw, 3rem);
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -0.03em;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }

  .fc-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 2px;
    padding-bottom: 2px;
  }

  .fc-then-label {
    font-size: clamp(7px, 0.6vw, 10px);
    color: rgba(255,255,255,0.3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
  }

  .fc-then-time {
    font-size: clamp(0.85rem, 1.3vw, 1.2rem);
    font-weight: 600;
    color: rgba(255,255,255,0.5);
    font-variant-numeric: tabular-nums;
  }

  /* ── Weather ─────────────────────────────────────────────── */
  #weather-block {
    grid-column: 1;
    grid-row: 2;
    align-self: end;
    display: inline-flex;
    flex-direction: column;
    gap: 0.4vh;
    background: #1a1a1a;
    border-radius: 12px;
    padding: clamp(10px, 1.4vh, 16px) clamp(12px, 1.4vw, 18px);
    border: 0.5px solid rgba(255,255,255,0.08);
    align-self: end;
    justify-self: start;
  }

  #weather-temp {
    font-size: clamp(1.4rem, 3vw, 2.8rem);
    font-weight: 600;
    color: #ffffff;
    line-height: 1;
  }

  #weather-emoji {
    font-size: 0.75em;
    margin-left: 0.25em;
    vertical-align: middle;
  }

  #weather-emoji:empty { display: none; }

  #weather-cond {
    font-size: clamp(0.65rem, 0.9vw, 0.85rem);
    color: rgba(255,255,255,0.75);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    font-weight: 400;
  }

  #nudibranch-canvas {
    position: fixed;
    z-index: 4;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1.2s ease;
  }

  /* ── Settings ─────────────────────────────────────────────── */
  #settings-btn {
    position: fixed;
    bottom: 2vh;
    right: 2vw;
    z-index: 10;
    background: none;
    border: none;
    cursor: pointer;
    padding: 8px;
    opacity: 0.25;
    transition: opacity 0.2s;
  }

  #settings-btn:hover { opacity: 0.8; }

  #settings-btn svg {
    width: clamp(16px, 1.4vw, 22px);
    height: clamp(16px, 1.4vw, 22px);
    fill: #ffffff;
  }

  #settings-panel {
    position: fixed;
    bottom: calc(2vh + 44px);
    right: 2vw;
    z-index: 10;
    background: #1a1a1a;
    border: 0.5px solid rgba(255,255,255,0.1);
    border-radius: 10px;
    padding: 14px 16px;
    display: none;
    flex-direction: column;
    gap: 10px;
    min-width: 180px;
  }

  #settings-panel.open { display: flex; }

  #settings-panel .setting-label {
    font-size: 0.65rem;
    color: rgba(255,255,255,0.4);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 400;
  }

  #settings-panel input[type=range] {
    width: 100%;
    accent-color: #ffffff;
    cursor: pointer;
  }

  #overlay-value {
    font-size: 0.7rem;
    color: rgba(255,255,255,0.5);
    font-family: monospace;
    text-align: right;
  }
</style>
</head>
<body>

<div id="webcam">
  <iframe
    src="https://www.youtube.com/embed/9Pm6Ji6tm7s?autoplay=1&mute=1&controls=0&loop=1&playlist=9Pm6Ji6tm7s&modestbranding=1&showinfo=0&rel=0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</div>

<div id="overlay"></div>

<canvas id="nudibranch-canvas"></canvas>

<div id="ui">

<div id="clock-block">
  <div id="helly">Helly</div>
  <div id="clock">--:--</div>
  <div id="date">—</div>
</div>

<div id="ferries">
  <div class="ferry-card">
    <div class="fc-header">
      <div class="fc-badge f4-badge">F4</div>
      <div class="fc-dest">Centraal Station</div>
    </div>
    <div class="fc-main">
      <div class="fc-left">
        <div class="fc-label">next ferry in</div>
        <div class="fc-countdown" id="countdown-f4">--:--</div>
      </div>
      <div class="fc-right">
        <div class="fc-then-label">then</div>
        <div class="fc-then-time" id="after-f4">—</div>
      </div>
    </div>
  </div>
  <div class="ferry-card">
    <div class="fc-header">
      <div class="fc-badge f7-badge">F7</div>
      <div class="fc-dest">Pontsteiger</div>
    </div>
    <div class="fc-main">
      <div class="fc-left">
        <div class="fc-label">next ferry in</div>
        <div class="fc-countdown" id="countdown-f7">--:--</div>
      </div>
      <div class="fc-right">
        <div class="fc-then-label">then</div>
        <div class="fc-then-time" id="after-f7">—</div>
      </div>
    </div>
  </div>
</div>

<div id="weather-block">
  <div id="weather-temp">--°<span id="weather-emoji"></span></div>
  <div id="weather-cond">—</div>
</div>

</div>

<!-- Settings -->
<div id="settings-panel">
  <div class="setting-label">Overlay opacity</div>
  <input type="range" id="overlay-slider" min="0" max="80" step="5" value="55">
  <div id="overlay-value">55%</div>
</div>

<button id="settings-btn" title="Settings">
  <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
    <path d="M12 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
    <path fill-rule="evenodd" d="M10.075 2.567a2 2 0 0 1 3.85 0l.191.688a1 1 0 0 0 1.414.612l.643-.302a2 2 0 0 1 2.722 2.722l-.302.643a1 1 0 0 0 .612 1.414l.688.191a2 2 0 0 1 0 3.85l-.688.191a1 1 0 0 0-.612 1.414l.302.643a2 2 0 0 1-2.722 2.722l-.643-.302a1 1 0 0 0-1.414.612l-.191.688a2 2 0 0 1-3.85 0l-.191-.688a1 1 0 0 0-1.414-.612l-.643.302a2 2 0 0 1-2.722-2.722l.302-.643a1 1 0 0 0-.612-1.414l-.688-.191a2 2 0 0 1 0-3.85l.688-.191a1 1 0 0 0 .612-1.414l-.302-.643a2 2 0 0 1 2.722-2.722l.643.302a1 1 0 0 0 1.414-.612l.191-.688zM12 16a4 4 0 1 0 0-8 4 4 0 0 0 0 8z"/>
  </svg>
</button>

<script>
const TPC          = '30009902';
const WORKER       = 'https://hellyhome-proxy.thatharmansinghworkers.workers.dev';
const FERRY_API    = 'http://v0.ovapi.nl/tpc/' + TPC;
const WEATHER_API  = 'https://api.open-meteo.com/v1/forecast?latitude=52.4009&longitude=4.8917&current=temperature_2m,weather_code&timezone=Europe%2FAmsterdam';
const FERRY_REFRESH   = 30_000;
const WEATHER_REFRESH = 10 * 60_000;

function pad2(n) { return String(n).padStart(2, '0'); }

function parseTime(str) {
  if (!str) return null;
  const m = str.match(/T(\d{2}):(\d{2})/);
  if (!m) return null;
  const t = new Date();
  t.setHours(+m[1], +m[2], 0, 0);
  if (t < Date.now() - 90_000) t.setDate(t.getDate() + 1);
  return t;
}

function secsUntil(t) { return Math.round((t - Date.now()) / 1000); }

function fmtCountdown(secs) {
  if (secs <= 0) return '0:00';
  if (secs < 60) return '0:' + pad2(secs);
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  if (m >= 60) return Math.floor(m / 60) + 'h ' + pad2(m % 60) + 'm';
  return m + ':' + pad2(s);
}

function fmtClock(t) { return pad2(t.getHours()) + ':' + pad2(t.getMinutes()); }

function weatherEmoji(code) {
  if (code === 0)  return '☀';  // ☀ clear
  if (code <= 2)   return '⛅';  // ⛅ partly cloudy
  if (code === 3)  return '☁';  // ☁ overcast
  if (code <= 49)  return '☁';  // ☁ fog
  if (code <= 65)  return '☔';  // ☔ rain/drizzle
  if (code <= 82)  return '☔';  // ☔ snow/rain showers
  if (code <= 86)  return '❄';  // ❄ snow
  if (code <= 99)  return '⚡';  // ⚡ thunderstorm
  return '';
}

function weatherDesc(code) {
  if (code === 0)  return 'Clear sky';
  if (code <= 2)   return 'Partly cloudy';
  if (code === 3)  return 'Overcast';
  if (code <= 49)  return 'Foggy';
  if (code <= 55)  return 'Drizzle';
  if (code <= 65)  return 'Rain';
  if (code <= 77)  return 'Snow';
  if (code <= 82)  return 'Rain showers';
  if (code <= 86)  return 'Snow showers';
  if (code <= 99)  return 'Thunderstorm';
  return '—';
}

const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function tickClock() {
  const now = new Date();
  document.getElementById('clock').textContent =
    pad2(now.getHours()) + ':' + pad2(now.getMinutes());
  document.getElementById('date').textContent =
    DAYS[now.getDay()] + ' · ' + now.getDate() + ' ' + MONTHS[now.getMonth()];
}

const state = { f4: [], f7: [] };
let ferryTick = null;

function renderFerry(id) {
  const deps = state[id].filter(d => secsUntil(d) > -10);
  const cdEl = document.getElementById('countdown-' + id);
  const afEl = document.getElementById('after-' + id);
  if (!deps.length) {
    cdEl.textContent = '--:--';
    afEl.textContent = '—';
    return;
  }
  cdEl.textContent = fmtCountdown(secsUntil(deps[0]));
  afEl.textContent = deps[1] ? fmtClock(deps[1]) : '—';
}

async function fetchFerries() {
  try {
    const url = WORKER + '?tpc=' + TPC;
    const res = await fetch(url, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const passes = data[TPC]?.Passes;
    if (!passes) throw new Error('No passes');

    const all = Object.values(passes)
      .filter(p => p.JourneyStopType === 'FIRST' && p.TripStopStatus !== 'CANCEL')
      .map(p => ({
        line: p.LinePublicNumber,
        time: parseTime(p.ExpectedDepartureTime || p.TargetDepartureTime),
      }))
      .filter(p => p.time && secsUntil(p.time) > -10)
      .sort((a, b) => a.time - b.time);

    state.f4 = all.filter(p => p.line === 'F4').map(p => p.time);
    state.f7 = all.filter(p => p.line === 'F7').map(p => p.time);

    renderFerry('f4');
    renderFerry('f7');

    if (ferryTick) clearInterval(ferryTick);
    ferryTick = setInterval(() => { renderFerry('f4'); renderFerry('f7'); }, 1000);
  } catch (err) {
    console.error('[ferries]', err);
  }
}

async function fetchWeather() {
  try {
    const res = await fetch(WEATHER_API);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    const temp = Math.round(data.current.temperature_2m);
    const code = data.current.weather_code;
    document.getElementById('weather-temp').textContent = temp + '°';
    document.getElementById('weather-emoji').textContent = weatherEmoji(code);
    document.getElementById('weather-cond').textContent = weatherDesc(code);
  } catch (err) {
    console.error('[weather]', err);
    setTimeout(fetchWeather, 5000);
  }
}

let manualOpacity = 0;

function updateOverlay() {
  const overlay = document.getElementById('overlay');
  overlay.style.background = `rgba(0,0,0,${manualOpacity})`;
  const slider = document.getElementById('overlay-slider');
  if (slider) {
    slider.value = Math.round(manualOpacity * 100);
    document.getElementById('overlay-value').textContent = Math.round(manualOpacity * 100) + '%';
  }
}

// Settings panel
document.getElementById('settings-btn').addEventListener('click', (e) => {
  e.stopPropagation();
  document.getElementById('settings-panel').classList.toggle('open');
});

document.addEventListener('click', () => {
  document.getElementById('settings-panel').classList.remove('open');
});

document.getElementById('settings-panel').addEventListener('click', e => e.stopPropagation());

document.getElementById('overlay-slider').addEventListener('input', (e) => {
  manualOpacity = e.target.value / 100;
  document.getElementById('overlay-value').textContent = e.target.value + '%';
  updateOverlay();
});

tickClock();
setInterval(tickClock, 1000);
fetchFerries();
setInterval(fetchFerries, FERRY_REFRESH);
fetchWeather();
setInterval(fetchWeather, WEATHER_REFRESH);
setInterval(updateOverlay, 60_000);
updateOverlay();

// Nudibranch squirm engine
(function() {
  const canvas = document.getElementById('nudibranch-canvas');
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.src = 'nudibranch.png';

  const W = 45, H = 55; // display size
  canvas.width = W + 20;
  canvas.height = H + 20;

  let active = false;
  let posX, posY, startTime, duration;
  let rafId = null;

  function scheduleNext() {
    const wait = (40 + Math.random() * 70) * 1000;
    setTimeout(startSwim, wait);
  }

  function startSwim() {
    // Start from a random point along the top or left edge
    const startLeft = Math.random() < 0.6;
    if (startLeft) {
      posX = -80;
      posY = Math.random() * window.innerHeight * 0.4;
    } else {
      posX = Math.random() * window.innerWidth * 0.5;
      posY = -H - 20;
    }
    duration = (22 + Math.random() * 10) * 1000;
    startTime = performance.now();
    canvas.style.opacity = '0';
    active = true;
    setTimeout(() => { canvas.style.opacity = '0.88'; }, 50);
    if (rafId) cancelAnimationFrame(rafId);
    rafId = requestAnimationFrame(tick);
  }

  function tick(now) {
    if (!active) return;
    const elapsed = now - startTime;
    const progress = elapsed / duration;

    if (posY > window.innerHeight + H || posX > window.innerWidth + W) {
      canvas.style.opacity = '0';
      active = false;
      scheduleNext();
      return;
    }

    // Fade out near end
    if (progress > 0.88) {
      canvas.style.opacity = String(1 - (progress - 0.88) / 0.12);
    }

    // Diagonal travel — 4 o'clock heading (more down, less right)
    const totalTravel = window.innerHeight + H + 40;
    posY = posY + (totalTravel / duration) * 16;
    posX = posX + (totalTravel / duration) * 4;

    // Gentle lateral drift over the diagonal path
    const driftX = Math.sin(elapsed / 3200) * 10;
    canvas.style.left = (posX - canvas.width / 2 + driftX) + 'px';
    canvas.style.top = posY + 'px';

    // Draw squirming body using sine-wave column displacement
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    const t = elapsed / 1000;
    const slices = 40;
    const sliceH = H / slices;
    const offX = (canvas.width - W) / 2;

    for (let i = 0; i < slices; i++) {
      const srcY = (i / slices) * img.naturalHeight;
      const srcH = img.naturalHeight / slices;
      const wave = Math.sin(t * 2.5 - i * 0.35) * (1.5 + i * 0.06);
      const dx = offX + wave;
      ctx.drawImage(
        img,
        0, srcY, img.naturalWidth, srcH,
        dx, i * sliceH + 15, W, sliceH + 0.5
      );
    }

    rafId = requestAnimationFrame(tick);
  }

  img.onload = function() {
    // First appearance after 15-35 seconds
    setTimeout(startSwim, (5 + Math.random() * 5) * 1000);
  };
})();
</script>
</body>
</html>
